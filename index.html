<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teknikel Envanter</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 16px; }
.app { max-width: 480px; margin: 0 auto; }
.header { background: #1F4E79; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; }
.header h1 { font-size: 17px; font-weight: bold; color: #fff; }
.header p { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; }
.tab.active { background: #1F4E79; color: #fff; }
.tab.inactive { background: #fff; color: #1F4E79; border: 1px solid #1F4E79; }
.card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 8px; }
.input-row { display: flex; gap: 8px; }
input[type=text], input[type=number] { height: 44px; border: 1px solid #ccc; border-radius: 8px; padding: 0 14px; font-size: 15px; outline: none; }
input[type=text] { flex: 1; background: #FFF9E6; }
input[type=number] { width: 80px; text-align: center; background: #FFF9E6; }
input[type=text]:focus, input[type=number]:focus { border-color: #1F4E79; }
.scan-btn { width: 44px; height: 44px; border: 1px solid #ccc; border-radius: 8px; background: #f5f5f5; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.scan-btn:active { background: #1F4E79; }
.res-table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
.res-table th { background: #1F4E79; color: #fff; font-size: 12px; padding: 10px; text-align: center; }
.res-table td { padding: 12px 10px; text-align: center; font-size: 14px; }
.update-row { display: flex; margin-top: 6px; border-radius: 8px; overflow: hidden; }
.update-label { background: #1F4E79; color: #fff; font-size: 11px; font-weight: bold; padding: 8px 12px; white-space: nowrap; }
.update-val { background: #f5f5f5; font-size: 12px; color: #555; padding: 8px 12px; flex: 1; text-align: center; }
.qty-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.qty-row label { font-size: 13px; font-weight: bold; color: #555; }
.add-btn { width: 100%; margin-top: 10px; padding: 12px; background: #1F4E79; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
.add-btn:disabled { background: #aaa; cursor: not-allowed; }

.suggestions { margin-top: 8px; max-height: 260px; overflow-y: auto; border-radius: 8px; }
.suggestions:empty { display: none; }
.sug-item { padding: 12px 14px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px; background: #fff; }
.sug-item:hover, .sug-item:active { background: #E2EFDA; }
.sug-item:last-child { border-bottom: none; }
.sug-name { font-size: 13px; color: #222; flex: 1; text-align: left; }
.sug-price { font-size: 13px; font-weight: bold; color: #1F4E79; white-space: nowrap; }
.sug-barcode { font-size: 11px; color: #999; }
.sug-count { padding: 8px 14px; font-size: 12px; color: #888; background: #f5f5f5; text-align: center; border-radius: 8px 8px 0 0; }
.info { text-align: center; font-size: 13px; color: #888; padding: 6px 0; }
.badge { display: inline-block; background: #c0392b; color: #fff; border-radius: 10px; font-size: 11px; padding: 1px 6px; margin-left: 4px; }
.empty-basket { text-align: center; color: #aaa; padding: 30px 0; font-size: 14px; }
.clear-btn { width: 100%; margin-top: 10px; padding: 11px; background: #c0392b; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }

/* Sepet tablosu */
.basket-wrap { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.basket-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.basket-tbl th { background: #1F4E79; color: #fff; padding: 10px 6px; text-align: center; }
.basket-tbl .item-row td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #eee; color: #222; background: #fff; }
.basket-tbl .item-row:nth-child(even) td { background: #f5f8ff; }
.basket-tbl .kdv-hariç td { padding: 10px 6px; text-align: center; background: #E2EFDA; color: #333; font-size: 13px; }
.basket-tbl .kdv-dahil td { padding: 12px 6px; text-align: center; background: #1F4E79; color: #fff; font-weight: bold; font-size: 16px; }
.del-btn { background: none; border: none; color: #c0392b; font-size: 18px; cursor: pointer; }

/* Kamera */
.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.overlay.active { display: flex; }
.video-wrap { position: relative; }
#video { width: 300px; height: 220px; border-radius: 10px; object-fit: cover; display: block; }
.frame { position: absolute; top: 0; left: 0; width: 300px; height: 220px; border: 2px solid #4CAF50; border-radius: 10px; pointer-events: none; }
.overlay-hint { color: rgba(255,255,255,0.75); font-size: 13px; }
.close-btn { color: #fff; font-size: 14px; cursor: pointer; padding: 10px 24px; border: 1px solid rgba(255,255,255,0.4); border-radius: 24px; background: transparent; }
</style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#1F4E79">
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📦 Teknikel Envanter</h1>
    <p>Barkod veya ürün adı ile sorgulama</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('sorgu')">🔍 Sorgulama</button>
    <button class="tab inactive" onclick="showTab('sepet')" id="sepetTab">🛒 Sepet</button>
  </div>

  <div id="tab-sorgu">
    <div class="card">
      <div class="label">BARKOD / ÜRÜN ADI</div>
      <div class="input-row">
        <input type="text" id="searchInput" placeholder="Girin veya kamerayla okutun..." autocomplete="off" />
        <button class="scan-btn" id="scanBtn">📷</button>
      </div>
      <div id="suggestions" class="suggestions"></div>
    </div>

    <table class="res-table">
      <thead><tr><th>ÜRÜN ADI</th><th>FİYAT</th><th>DURUM</th></tr></thead>
      <tbody><tr>
        <td id="resName" style="font-weight:bold;color:#1a1a1a;background:#f5f5f5">—</td>
        <td id="resPrice" style="font-weight:bold;color:#1F4E79;font-size:16px;background:#E2EFDA">—</td>
        <td id="resStatus" style="color:#888;background:#f5f5f5">Bekliyor...</td>
      </tr></tbody>
    </table>

    <div class="update-row">
      <div class="update-label">SON GÜNCELLEME</div>
      <div class="update-val" id="resDate">—</div>
    </div>

    <div class="qty-row">
      <label>Adet:</label>
      <input type="number" id="qtyInput" value="1" min="1" max="9999" />
    </div>

    <button class="add-btn" id="addBtn" disabled onclick="addToBasket()">➕ Sepete Ekle</button>
    <p class="info" id="infoBox">Veriler yükleniyor...</p>
  </div>

  <div id="tab-sepet" style="display:none">
    <div class="basket-wrap" id="basketWrap">
      <div class="empty-basket">Sepet boş<br><span style="font-size:11px">Sorgulama sayfasından ürün ekleyin</span></div>
    </div>
    <button class="clear-btn" onclick="clearBasket()">🗑️ Sepeti Temizle</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted style="width:300px;height:220px;border-radius:10px;object-fit:cover;"></video>
    <div class="frame"></div>
  </div>
  <div class="overlay-hint">Barkodu yeşil çerçeveye getirin</div>
  <button class="close-btn" id="closeBtn">Kapat</button>
</div>

<script>
const SHEET_ID = '1PuPXSGaMwDrUburqx2UTS6M2tYgdeZofxG6BUKGohYc';
const API = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=Envanter';

let products = [], basket = [], currentProduct = null;

async function fetchSheet(sheetName, barcodeCol, nameCol, priceCol, updatedCol) {
  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheetName);
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/setResponse\(([\s\S]*?)\);/)[1]);
    return json.table.rows.filter(r => r.c && r.c[nameCol] && r.c[nameCol].v).map(r => ({
      barcode: barcodeCol !== null && r.c[barcodeCol] ? String(r.c[barcodeCol].v).trim() : '',
      name: String(r.c[nameCol].v || ''),
      price: r.c[priceCol] ? r.c[priceCol].v : null,
      updated: updatedCol !== null && r.c[updatedCol] ? r.c[updatedCol].v : null,
      sheet: sheetName
    }));
  } catch(e) { return []; }
}

async function loadData() {
  try {
    document.getElementById('infoBox').textContent = 'Veriler yükleniyor...';
    const [envanter, MW torc, MW makina] = await Promise.all([
      fetchSheet('Envanter', 0, 1, 2, 4),
      fetchSheet('Torç ve Sarfları', 0, 1, 4, 3),
      fetchSheet('Kaynak Makinaları', 0, 1, 4, 3)
    ]);
    products = [...envanter, ...torc, ...makina];
    document.getElementById('infoBox').textContent = products.length + ' ürün yüklendi.';
  } catch(e) {
    document.getElementById('infoBox').textContent = 'Veri yüklenemedi.';
  }
}

function formatDate(val) {
  if (!val) return '—';
  var s = String(val);
  if (s.startsWith('Date(')) {
    var p = s.replace('Date(','').replace(')','').split(',');
    var d = new Date(parseInt(p[0]), parseInt(p[1]), parseInt(p[2]));
    return d.toLocaleDateString('tr-TR');
  }
  return s;
}

function showResult(found) {
  var nameEl = document.getElementById('resName');
  var priceEl = document.getElementById('resPrice');
  var statusEl = document.getElementById('resStatus');
  var dateEl = document.getElementById('resDate');
  var addBtn = document.getElementById('addBtn');

  if (found) {
    nameEl.textContent = found.name || '—';
    priceEl.textContent = found.price != null ? Number(found.price).toFixed(2) + ' ₺' : '—';
    statusEl.textContent = '✓ Bulundu'; statusEl.style.color = '#1a7a4a';
    dateEl.textContent = formatDate(found.updated);
    addBtn.disabled = false; currentProduct = found;
  } else {
    nameEl.textContent = 'Bulunamadı'; priceEl.textContent = '—';
    statusEl.textContent = '✗ Bulunamadı'; statusEl.style.color = '#c0392b';
    dateEl.textContent = '—'; addBtn.disabled = true; currentProduct = null;
  }
}

function selectProduct(barcode) {
  var p = products.find(x => x.barcode === barcode);
  if (p) {
    document.getElementById('searchInput').value = p.name;
    document.getElementById('suggestions').innerHTML = '';
    showResult(p);
  }
}

function search(q) {
  q = q.trim();
  var sugEl = document.getElementById('suggestions');

  if (!q) {
    document.getElementById('resName').textContent = '—';
    document.getElementById('resPrice').textContent = '—';
    document.getElementById('resStatus').textContent = 'Bekliyor...';
    document.getElementById('resStatus').style.color = '#888';
    document.getElementById('resDate').textContent = '—';
    document.getElementById('addBtn').disabled = true;
    currentProduct = null;
    sugEl.innerHTML = '';
    return;
  }

  // Tam barkod eşleşmesi varsa direkt seç
  var exact = products.find(p => p.barcode === q);
  if (exact) {
    showResult(exact);
    sugEl.innerHTML = '';
    return;
  }

  // İsimde veya barkodda geçen tüm ürünleri bul
  var ql = q.toLowerCase();
  var matches = products.filter(p => p.name.toLowerCase().includes(ql) || p.barcode.toLowerCase().includes(ql));

  if (matches.length === 0) {
    showResult(null);
    sugEl.innerHTML = '';
    return;
  }

  if (matches.length === 1) {
    showResult(matches[0]);
    sugEl.innerHTML = '';
    return;
  }

  // Birden fazla eşleşme - liste göster
  showResult(matches[0]);
  var html = '<div class="sug-count">' + matches.length + ' eşleşme - seçin:</div>';
  html += matches.slice(0, 30).map(function(p) {
    return '<div class="sug-item" onclick="selectProduct(\'' + p.barcode + '\')">' +
      '<span class="sug-name">' + p.name + '<br><span class="sug-barcode">' + p.barcode + '</span></span>' +
      '<span class="sug-price">' + (p.price != null ? Number(p.price).toFixed(2) + ' ₺' : '—') + '</span>' +
      '</div>';
  }).join('');
  sugEl.innerHTML = html;
}

function addToBasket() {
  if (!currentProduct) return;
  var qty = parseInt(document.getElementById('qtyInput').value) || 1;
  var existing = basket.find(i => i.barcode === currentProduct.barcode);
  if (existing) { existing.qty += qty; } else { basket.push({...currentProduct, qty}); }
  renderBasket(); updateBadge();
  document.getElementById('searchInput').value = '';
  document.getElementById('qtyInput').value = 1;
  document.getElementById('suggestions').innerHTML = '';
  search('');
  showTab('sepet');
}

function removeFromBasket(barcode) {
  basket = basket.filter(i => i.barcode !== barcode);
  renderBasket(); updateBadge();
}

function clearBasket() {
  if (!basket.length) return;
  if (confirm('Sepeti temizlemek istiyor musunuz?')) { basket = []; renderBasket(); updateBadge(); }
}

function renderBasket() {
  var el = document.getElementById('basketWrap');
  if (!basket.length) {
    el.innerHTML = '<div class="empty-basket">Sepet boş<br><span style="font-size:11px">Sorgulama sayfasından ürün ekleyin</span></div>';
    return;
  }
  var total = 0;
  var rows = basket.map(item => {
    var sub = item.price != null ? item.price * item.qty : 0;
    total += sub;
    return '<tr class="item-row"><td>' + item.name + '</td><td>' + (item.price != null ? Number(item.price).toFixed(2) + ' ₺' : '—') + '</td><td>' + item.qty + '</td><td>' + (item.price != null ? sub.toFixed(2) + ' ₺' : '—') + '</td><td><button class="del-btn" onclick="removeFromBasket(\'' + item.barcode + '\')">✕</button></td></tr>';
  }).join('');

  var kdvDahil = (total * 1.20).toFixed(2);

  el.innerHTML = '<table class="basket-tbl">' +
    '<thead><tr><th>Ürün</th><th>Fiyat</th><th>Adet</th><th>Toplam</th><th></th></tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
    '<tfoot>' +
    '<tr class="kdv-hariç"><td colspan="3" style="text-align:right;padding-right:10px">KDV Hariç (%20)</td><td colspan="2">' + total.toFixed(2) + ' ₺</td></tr>' +
    '<tr class="kdv-dahil"><td colspan="3" style="text-align:right;padding-right:10px">KDV Dahil Toplam</td><td colspan="2">' + kdvDahil + ' ₺</td></tr>' +
    '</tfoot></table>';
}

function updateBadge() {
  var count = basket.reduce((s, i) => s + i.qty, 0);
  document.getElementById('sepetTab').innerHTML = count > 0 ? '🛒 Sepet <span class="badge">' + count + '</span>' : '🛒 Sepet';
}

function showTab(tab) {
  document.getElementById('tab-sorgu').style.display = tab === 'sorgu' ? 'block' : 'none';
  document.getElementById('tab-sepet').style.display = tab === 'sepet' ? 'block' : 'none';
  var tabs = document.querySelectorAll('.tab');
  tabs[0].className = 'tab ' + (tab === 'sorgu' ? 'active' : 'inactive');
  tabs[1].className = 'tab ' + (tab === 'sepet' ? 'active' : 'inactive');
}

document.getElementById('searchInput').addEventListener('input', e => search(e.target.value));

var reader = null;
document.getElementById('scanBtn').addEventListener('click', async () => {
  document.getElementById('overlay').classList.add('active');
  try {
    var hints = new Map();
    var formats = [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.CODABAR,
      ZXing.BarcodeFormat.DATA_MATRIX
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    reader = new ZXing.BrowserMultiFormatReader(hints);

    // Arka kamerayı yüksek çözünürlükte kullan
    var constraints = {
      audio: false,
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    };

    await reader.decodeFromConstraints(constraints, 'video', function(result) {
      if (result) {
        var val = result.getText();
        document.getElementById('searchInput').value = val;
        search(val);
        stopCam();
      }
    });
  } catch(e) { alert('Kamera açılamadı: ' + e.message); stopCam(); }
});

function stopCam() {
  if (reader) { reader.reset(); reader = null; }
  document.getElementById('overlay').classList.remove('active');
}

document.getElementById('closeBtn').addEventListener('click', stopCam);
loadData();
</script>
</body>
</html>
